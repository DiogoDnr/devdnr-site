services:
  site:
    image: nginx:alpine
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devdnr-site.rule=Host(`devdnr.com.br`) || Host(`www.devdnr.com.br`)"
      - "traefik.http.routers.devdnr-site.entrypoints=websecure"
      - "traefik.http.routers.devdnr-site.tls.certresolver=letsencrypt"
      - "traefik.http.routers.devdnr-site-http.rule=Host(`devdnr.com.br`) || Host(`www.devdnr.com.br`)"
      - "traefik.http.routers.devdnr-site-http.entrypoints=web"
      - "traefik.http.routers.devdnr-site-http.middlewares=redirect-to-https"
    networks:
      - easypanel
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '' | base64 -d > /usr/share/nginx/html/index.html
        echo '' | base64 -d > /usr/share/nginx/html/styles.css
        echo '' | base64 -d > /usr/share/nginx/html/script.js
        exec nginx -g 'daemon off;'

networks:
  easypanel:
    external: true
